  - id: laban_effort_space
    name: Laban Effort · Space (Indirect/Direct)
    dim: mixed
    delta_vad: null
    sources: ["Laban 1947"]
    description: Approximated by `directness` feature.
    formula: "use directness"
    requires: []
    current_impl: false
    tier: 4
    cost_minutes: null

  - id: laban_effort_weight
    name: Laban Effort · Weight (Light/Strong)
    dim: mixed
    delta_vad: null
    sources: ["Laban 1947"]
    description: Approximated by `accel_peak`.
    formula: "use accel_peak"
    requires: []
    current_impl: false
    tier: 4
    cost_minutes: null

  - id: laban_effort_time
    name: Laban Effort · Time (Sustained/Sudden)
    dim: mixed
    delta_vad: null
    sources: ["Laban 1947"]
    description: Approximated by `jerk_l2` + `speed_variance`.
    formula: "use jerk + speed_variance"
    requires: []
    current_impl: false
    tier: 4
    cost_minutes: null

  - id: laban_effort_flow
    name: Laban Effort · Flow (Free/Bound)
    dim: mixed
    delta_vad: null
    sources: ["Laban 1947"]
    description: Approximated by `smoothness`.
    formula: "use smoothness"
    requires: []
    current_impl: false
    tier: 4
    cost_minutes: null

  - id: bap_categories
    name: BAP 141 Behavioural Categories
    dim: mixed
    delta_vad: null
    sources: ["Dael et al. BAP"]
    description: Requires human-annotated categorical labels (emblems, illustrators...).
    formula: null
    requires: [human_annotation]
    current_impl: false
    tier: 4
    cost_minutes: null

  - id: delsarte_laws
    name: Delsarte 9 Laws of Movement
    dim: mixed
    delta_vad: null
    sources: ["Delsarte (1811-1871)"]
    description: Altitude / Force / Sequence etc. Too abstract, mapped to Tier 1-3 above.
    formula: null
    requires: []
    current_impl: false
    tier: 4
    cost_minutes: null

  # ═══════════════════════════════════════════════════════════
  # PROJECT-ACTIVE ADDITIONS (2026-04-24) — replace deprecated V3/D1/D2
  # See docs/knowledge/methods/vad_indicators_definition.md for full writeup.
  # ═══════════════════════════════════════════════════════════

  - id: spine_uprightness
    name: Spine Uprightness (挺拔度)
    dim: V
    delta_vad: [+0.5, 0.0, +0.1]
    sources: ["Boone & Cunningham 2001 (leaning forward ↔ sadness)",
              "Karg §4.1 slumped posture ↔ depression"]
    description: >
      Asymmetric penalty on forward spine pitch. 1 = upright/backward-leaning,
      0 = maximally forward-leaning. Replaces lr_symmetry as V3 because
      symmetry's direction w.r.t. V is ambiguous.
    formula: "1 - mean(max(0, -sin(pitch_t)))  # pitch from root_rp_trig[2]"
    requires: [root_rp_trig]
    current_impl: false
    tier: 2
    cost_minutes: 5
    project_active: true
    project_role: "V3 (replaces lr_symmetry)"

  - id: reach_extension
    name: Reach Extension (手部前伸)
    dim: D
    delta_vad: [+0.1, +0.2, +0.7]
    sources: ["Ekman & Friesen 1972 hand/arm movements",
              "Karg §4.2 reaching as manipulation D-cue",
              "Project-specific (Social Handover framing)"]
    description: >
      Time-averaged max(0, wrist forward position in character frame).
      Captures "actively reaching into the world" — high when hands extended
      forward (manipulation intent), 0 when hands at side.
    formula: >
      mean(max(0, 0.5 * (x_loc[L_wrist, fwd] + x_loc[R_wrist, fwd])))
    requires: [link_pos_local]  # needs FK (shared with body_contraction)
    current_impl: false
    tier: 2
    cost_minutes: 10
    project_active: true
    project_role: "D1 (replaces bbox_volume)"

  - id: forward_approach
    name: Forward Approach (前向位移)
    dim: D
    delta_vad: [0.0, +0.2, +0.6]
    sources: ["Hall 1966 proxemics (approach as dominance signal)",
              "Karg §4.1 gait kinematics",
              "Project-specific"]
    description: >
      Character-frame forward velocity. Positive = actively approaching
      (dominant), negative = stepping back (submissive). Keeps sign
      (does not take abs).
    formula: "mean(transl_delta_local[:, 0])  # forward component"
    requires: [transl_delta]
    current_impl: false
    tier: 2
    cost_minutes: 2
    project_active: true
    project_role: "D2 (replaces head_height)"
