# DART environment for RTX 5090 (Blackwell / sm_120)
# Requires: CUDA 12.8+ toolkit, CUDA_HOME set correctly
#
# Usage:
#   1. conda env create -f environment_5090.yml
#   2. conda activate DART
#   3. export CUDA_HOME=/usr/local/cuda-12.9   # adjust to your system
#      pip install --no-build-isolation "git+https://github.com/facebookresearch/pytorch3d.git"
#   4. pip install --no-build-isolation chumpy  # optional, for legacy SMPL .pkl
#   5. python -c "import torch; print(torch.__version__, torch.version.cuda, torch.cuda.is_available())"
#
# Note: open3d and vpython are NOT imported anywhere in DART core code,
#       so they are omitted. Add them back if you need them for other purposes.

name: DART
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # ── PyTorch stack (CUDA 12.8 for Blackwell / 5090) ──
  # Install via pip for cu128 wheels since conda may not have latest builds
  - pip
  - setuptools
  - wheel
  # ── Core scientific ──
  - numpy>=1.24,<2.0
  - scipy>=1.10
  - scikit-learn>=1.2
  - pandas>=2.0
  - matplotlib>=3.6
  - seaborn
  - statsmodels
  # ── Utilities (conda) ──
  - pyyaml
  - tqdm
  - requests
  - filelock
  - networkx
  - sympy
  - pillow>=9.0
  - h5py
  - tabulate
  - colorama
  - joblib
  - packaging
  - ffmpeg
  - pip:
      # ── PyTorch (cu128 wheels for Blackwell/5090) ──
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch>=2.6
      - torchvision>=0.21
      - torchaudio>=2.6
      # ── Deep learning / model ──
      - einops>=0.7
      - loralib
      - torch-dct
      - accelerate
      # ── OpenAI CLIP (used in model encoder) ──
      - git+https://github.com/openai/CLIP.git
      # ── Hydra config system ──
      - hydra-core>=1.3
      - omegaconf>=2.3
      # ── Body models ──
      - smplx>=0.1.28
      # NOTE: chumpy has broken setup.py — install separately:
      #   pip install --no-build-isolation chumpy
      # ── 3D / geometry ──
      - trimesh>=4.0
      - pyrender>=0.1.45
      - PyOpenGL>=3.1
      - pyglet>=2.0
      - mesh2sdf
      - shapely>=2.0
      - rtree
      - pynavmesh
      - freetype-py
      # ── NLP (spacy v3 for Python 3.10 compat) ──
      - spacy>=3.0,<4.0
      # ── Logging & tracking ──
      - wandb
      - tensorboard>=2.14
      - tensorboardx
      # ── Jupyter (optional, for notebooks) ──
      - jupyter
      - ipykernel
      - ipywidgets
      # ── Other utilities ──
      - tyro
      - rich
      - lxml
      - blobfile
      - ftfy
      - regex
      - imageio
      - scikit-image
      - pywavelets
      - tifffile
      - lazy-loader
      - fvcore
      - iopath
      - docstring-parser
      - pydantic>=2.0
      - openai
      - httpx
      - huggingface_hub
