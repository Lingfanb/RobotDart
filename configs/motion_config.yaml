# Motion Taxonomy · Skill-Agent Hierarchy
#
# Groups the 22-class action library (configs/VAD/act_classes.yaml) by
# skill-agent ownership (manip / loco / gesture) and gesture sub-category
# (upper / lower).
#
# Source of truth for class names:  configs/VAD/act_classes.yaml
# Source of truth for VAD calibration:  configs/VAD/{anchors/, norm_params_by_action.yaml}
#
# Consumers (intended):
#   - Tier 2 Skill Dispatcher — pick agent for a given class
#   - Augmentation routing — upper-body vs full-body preset selection
#   - Paper Figure 1 — visual grouping of classes by tier
#
# Date: 2026-05-22 · Owner: Lingfan · Status: v1 (draft, needs user validation)

version: v1
last_updated: 2026-05-22

skills:

  manip:
    agent: ManipAgent
    tier: "1.1"
    description: Contact / object-mediated interaction (handover, handshake)
    classes:
      - handshake
      - give
      - take_pick

  loco:
    agent: LocoAgent
    tier: "1.3"
    description: Whole-body locomotion (root translates or substantial weight shift)
    classes:
      - walk
      - jog
      - run
      - jump
      - turn
      - stand
      - crouch
      - sit
      - climb
      - crawl
      - kick

  gesture:
    agent: MoGenAgent
    tier: "1.2"
    description: Non-contact expressive gesture (root largely stationary)
    subcategories:

      upper:
        description: Arm / hand driven gestures (root stationary, torso mostly upright)
        aug_preset: configs/MoGen/aug/preset_upper_body.yaml  # TBD — preset lost 5/12
        classes:
          - wave_one_arm
          - wave_two_arms
          - clap
          - salute
          - shrug
          - punch

      lower:
        description: Torso / root-pose driven gestures (waist bend, full-body sway)
        aug_preset: configs/MoGen/aug/preset_full_body.yaml   # TBD — preset lost 5/12
        classes:
          - bow
          - dance

# Sanity:  3 + 11 + 6 + 2 = 22 = NUM_ACT_CLASSES (configs/VAD/act_classes.yaml)
