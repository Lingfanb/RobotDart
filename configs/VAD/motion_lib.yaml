      - {seq: Eyes_Japan_Dataset__kaiwa__jump-11-warmup-kaiwa_stageii,   seg: 6,  sec: 2.8, label: run in place series}
      - {seq: HDM05__tr__HDM_tr_01-03_04_120_stageii,                    seg: 13, sec: 3.2, label: run}

  - name: jump
    desc: 跳跃 (原地 / 跨越)
    exemplar:
