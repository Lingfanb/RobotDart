    exemplar:
      - {seq: BMLrub__rub114__0013_knocking1_stageii,            seg: 4, sec: 3.0, label: stand}
      - {seq: Eyes_Japan_Dataset__aita__pose-19-funny-aita_stageii, seg: 3, sec: 3.0, label: stand}
      - {seq: CMU__142__142_17_stageii,                          seg: 0, sec: 2.9, label: stand}

  - name: crouch
    desc: 蹲 / 跪 (低位等待)
    exemplar:
      - {seq: CMU__31__31_08_stageii, seg: 12, sec: 3.1, label: crouch forward}
      - {seq: CMU__74__74_07_stageii, seg: 0,  sec: 2.9, label: crouch}
      - {seq: CMU__77__77_34_stageii, seg: 3,  sec: 3.4, label: crouch forward}

  - name: crawl
