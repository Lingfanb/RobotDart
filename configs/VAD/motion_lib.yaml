    exemplar:
      - {seq: BMLmovi__Subject_46_F_MoSh__Subject_46_F_12_stageii, seg: 2, sec: 2.4, label: crawl}
      - {seq: BMLmovi__Subject_40_F_MoSh__Subject_40_F_18_stageii, seg: 3, sec: 2.3, label: crawl forward}
      - {seq: BMLmovi__Subject_48_F_MoSh__Subject_48_F_16_stageii, seg: 2, sec: 2.1, label: crawl}
